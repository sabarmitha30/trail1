<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>PICK YOUR LEARNING TRACK</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* Container */
.course-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 40px;
}

/* Card */
.course-card {
    height: 200px;
    border-radius: 12px;
    color: white;
    display: flex;
    align-items: flex-end;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    background-size: cover;
    background-position: center;
    position: relative;
    cursor: pointer;
    overflow: hidden;
}

/* Dark overlay */
.course-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
}

/* Text above overlay */
.course-card span {
    position: relative;
    z-index: 2;
}

/* Hover effect */
.course-card:hover {
    transform: scale(1.05);
    transition: 0.3s;
}

/* ?? Quote Section */
.quote-section {
    margin-top: 50px;
    padding: 30px;
    text-align: center;
    background: #222;
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    border-radius: 10px;
    width: 80%;
    margin-left: auto;
    margin-right: auto;
}
</style>

</head>
