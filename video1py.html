<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Python Pro Course</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 30%;
    background: #020617;
    padding: 20px;
    overflow-y: auto;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.video-item {
    background: #1e293b;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.video-item:hover {
    background: #38bdf8;
    color: black;
}

/* Main */
.main {
    width: 70%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Thumbnail */
.thumbnail {
    text-align: center;
}

.thumbnail img {
    width: 80%;
    border-radius: 12px;
}

.play-btn {
    margin-top: 20px;
    padding: 12px 20px;
    background: red;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>?? Python Course</h2>

        <div class="video-item" onclick="openVideo(0)">1?? Introduction & Setup</div>
        <div class="video-item" onclick="openVideo(3600)">2?? Variables & Data Types</div>
        <div class="video-item" onclick="openVideo(7200)">3?? Conditional Statements</div>
        <div class="video-item" onclick="openVideo(10800)">4?? Loops (for, while)</div>
        <div class="video-item" onclick="openVideo(14400)">5?? Functions & Arguments</div>
        <div class="video-item" onclick="openVideo(18000)">6?? Lists & Tuples</div>
        <div class="video-item" onclick="openVideo(21600)">7?? Dictionaries & Sets</div>
        <div class="video-item" onclick="openVideo(25200)">8?? File Handling</div>
        <div class="video-item" onclick="openVideo(28800)">9?? OOP in Python</div>
        <div class="video-item" onclick="openVideo(32400)">?? Modules & Final Project</div>
    </div>

    <!-- Main -->
    <div class="main">

        <div class="thumbnail">
            <img src="https://img.youtube.com/vi/m67-bOpOoPU/maxresdefault.jpg">
            <br>
            <button class="play-btn" onclick="openVideo(0)">
                ? Start Course
            </button>
        </div>

    </div>

</div>

<script>

let videoId = "m67-bOpOoPU";

function openVideo(seconds) {
    let url = "https://youtu.be/" + videoId + "?t=" + seconds;
    window.open(url, "_blank");
}

</script>

</body>
</html>
